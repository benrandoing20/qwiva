services:
  - type: web
    name: qwiva-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon        # Oregon → Kenya via equatorial routing; try frankfurt (EU West) if latency is better
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      # -----------------------------------------------------------------------
      # Set all secrets in the Render dashboard (Settings → Environment).
      # Do NOT paste secrets into this file — it is committed to git.
      # -----------------------------------------------------------------------
      # Required:
      #   SUPABASE_URL
      #   SUPABASE_SERVICE_KEY
      #   SUPABASE_JWT_SECRET
      #   NVIDIA_API_KEY
      #   NVIDIA_API_BASE
      #   GROQ_API_KEY
      #   LITELLM_MODEL
      #   CLASSIFY_MODEL
      #   QDRANT_URL
      #   QDRANT_API_KEY
      #   QDRANT_COLLECTION
      #   FRONTEND_URL          (your Vercel URL, e.g. https://qwiva.vercel.app)
      #
      # Optional (enables observability):
      #   LANGFUSE_PUBLIC_KEY
      #   LANGFUSE_SECRET_KEY
      #   LANGFUSE_HOST         (default: https://cloud.langfuse.com)
      #
      # Scaling (when on Starter plan with Redis):
      #   REDIS_URL             (add Redis service in Render, copy Internal URL)
